# wspr configuration

# Each [[hotkeys]] entry is a push-to-talk binding: hold the combo, speak,
# release, and the transcript goes to that entry's sink:
#   type    - typed into the focused window via xdotool
#   socket  - sent over a Unix socket; optional `socket` key overrides
#             the default $XDG_RUNTIME_DIR/wspr.sock
#   command - handed to the command plugin named under [command], which
#             routes it through a local LLM (Ollama) onto a whitelisted
#             action and executes it (see [command], [ollama])

[[hotkeys]]
combo = "super+space"
sink = "type"

# Example command binding - needs the wspr-i3 plugin (./install.sh --with-i3).
# Uncomment it and [command] below to enable. The [[hotkeys]] header must be
# uncommented too: a bare header with no keys is an empty entry, which fails
# at startup.
#[[hotkeys]]
#combo = "super+ctrl+space"
#sink = "command"

# Example socket binding.
#[[hotkeys]]
#combo = "super+shift+d"
#sink = "socket"
#socket = "$XDG_RUNTIME_DIR/wspr.sock"

# [command] names the plugin module that handles `command` bindings and
# provides wspr's subcommands. It must be importable from the app
# directory or ~/.local/share/wspr/plugins. wspr-i3, the i3 plugin,
# ships in this repo as wspr_i3/.
#[command]
#module = "wspr_i3"

# [model] is the speech-to-text stage: the local faster-whisper model that
# turns recorded audio into a transcript. Every binding uses it, no matter
# which sink the transcript then goes to.
[model]
size = "base.en"       # tiny.en, base.en, small.en, medium, large-v3
device = "cpu"         # cpu, cuda
compute_type = "int8"  # int8 (CPU), float16 (GPU)

# [ollama] is the routing stage, used only by `command` bindings: the
# transcript goes to this local Ollama model, which maps it onto the action
# whitelist (or rejects it). Dictation never touches Ollama.
#[ollama]
# url = "http://localhost:11434"
# model = "gemma3:1b"
# timeout = 30         # seconds to wait for a routing reply
# keep_alive = "30m"   # how long Ollama keeps the model warm after a request
# confidence_threshold = 0.7   # below this, 'uncertain' mode asks first

# [confirm] controls when a routed command asks (rofi yes/no) before
# executing. Privileged actions (system updates) ALWAYS confirm.
#   always    - confirm every command
#   uncertain - confirm privileged actions and shaky routings (the default)
#   never     - confirm only privileged actions
#[confirm]
# mode = "uncertain"
